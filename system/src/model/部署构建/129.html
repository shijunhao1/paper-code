<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 129</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 129</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "958::n0", "label": "英国", "title": "<b>英国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 958<br>Mentions: 3<br>Sent IDs: 0|3|4<br>Mentions:<br>name=英国, sent_id=0, pos=[15, 17], type=ENTITY<br>name=英国, sent_id=3, pos=[43, 45], type=ENTITY<br>name=英国, sent_id=4, pos=[41, 43], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "958::n1", "label": "战场", "title": "<b>战场</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 958<br>Mentions: 2<br>Sent IDs: 0|4<br>Mentions:<br>name=战场, sent_id=0, pos=[20, 22], type=ENTITY<br>name=战场, sent_id=4, pos=[63, 65], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "958::n2", "label": "FDG", "title": "<b>FDG</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 958<br>Mentions: 4<br>Sent IDs: 0|1|2|3<br>Mentions:<br>name=地理空间情报系统, sent_id=0, pos=[23, 31], type=ENTITY<br>name=FDG系统, sent_id=1, pos=[30, 35], type=ENTITY<br>name=FDG, sent_id=2, pos=[0, 3], type=ENTITY<br>name=FDG, sent_id=3, pos=[7, 10], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "958::n0", "to": "958::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 英国<br>Tail entity: 战场<br>Evidence sent IDs: 0|4<br>Evidence:<br>[0] 据洛克希德・马丁公司称，第一批英国部署于战场的地理空间情报系统已经具备初步作战能力。<br>[4]        洛克希德・马丁公司信息系统和全球解决方案的主管表示，这款首次推出的在英国设计和制造系统，使用软件，将搜集、传播和战场上地理空间情报的有效性提升到了一个新的水平。", "width": 2, "arrows": "to"}, {"from": "958::n0", "to": "958::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 英国<br>Tail entity: FDG<br>Evidence sent IDs: 0|1|2|3<br>Evidence:<br>[0] 据洛克希德・马丁公司称，第一批英国部署于战场的地理空间情报系统已经具备初步作战能力。<br>[1] 现在洛・马公司及其合作伙伴将进入第二批的研究，这将提供额外的FDG系统。<br>[2] FDG是PICASSO项目的一部分，旨在提供战术绘图、数字地理信息和图像情报。<br>[3]        FDG提供一个数据中心、地理空间情报系统管理、发现、传播和利用能力，解决英国的联合部队情报集团可部署的要求，包括满足战术层面的移动和机动工作环境的规定。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
