<!DOCTYPE html>

<head>

  <style>

      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);

      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;

  </style>
</head>
<body>
  <div class="page">
    <div class="panel">

      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>

    const nodesData = [{"id": "829::n0", "label": "格林维尔号", "title": "<b>格林维尔号</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 829<br>Mentions: 5<br>Sent IDs: 0|1|3|4|5<br>Mentions:<br>name=洛杉矶级攻击潜艇格林维尔号, sent_id=0, pos=[4, 17], type=ENTITY<br>name=格林维尔号, sent_id=1, pos=[1, 6], type=ENTITY<br>name=格林维尔号, sent_id=3, pos=[4, 9], type=ENTITY<br>name=格林维尔号, sent_id=4, pos=[1, 6], type=ENTITY<br>name=洛杉矶级潜艇, sent_id=5, pos=[0, 6], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "829::n1", "label": "西太平洋地区", "title": "<b>西太平洋地区</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 829<br>Mentions: 2<br>Sent IDs: 0|2<br>Mentions:<br>name=西太平洋地区, sent_id=0, pos=[33, 39], type=ENTITY<br>name=西太平洋, sent_id=2, pos=[13, 17], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "829::n2", "label": "美国海军", "title": "<b>美国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 829<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=美国海军, sent_id=0, pos=[0, 4], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "829::n3", "label": "2010年9月10日", "title": "<b>2010年9月10日</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 829<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=2010年9月10日, sent_id=1, pos=[7, 17], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "829::n2", "to": "829::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: 格林维尔号<br>Evidence sent IDs: 0|1|3|4|5<br>Evidence:<br>[0] 美国海军洛杉矶级攻击潜艇格林维尔号完成为期6个月的预定部署任务，从西太平洋地区返回珍珠港-希卡姆联合基地。<br>[1]  格林维尔号于2010年9月10日离开珍珠港进行部署。<br>[3] 部署期间格林维尔号在第7舰队责任区内完成了多项任务。<br>[4]  格林维尔号是第61艘洛杉矶级潜艇也是第22艘改进型洛杉矶级攻击型潜艇，服役于1996年。<br>[5] 洛杉矶级潜艇可执行秘密监察、情报搜集和特种部队任务。", "width": 2, "arrows": "to"}, {"from": "829::n2", "to": "829::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国海军<br>Tail entity: 西太平洋地区<br>Evidence sent IDs: 0|2<br>Evidence:<br>[0] 美国海军洛杉矶级攻击潜艇格林维尔号完成为期6个月的预定部署任务，从西太平洋地区返回珍珠港-希卡姆联合基地。<br>[2] 这是该潜艇三年多来首次部署西太平洋。", "width": 2, "arrows": "to"}, {"from": "829::n2", "to": "829::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 2010年9月10日<br>Evidence sent IDs: 0|1<br>Evidence:<br>[0] 美国海军洛杉矶级攻击潜艇格林维尔号完成为期6个月的预定部署任务，从西太平洋地区返回珍珠港-希卡姆联合基地。<br>[1]  格林维尔号于2010年9月10日离开珍珠港进行部署。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
