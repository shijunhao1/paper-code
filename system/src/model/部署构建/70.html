<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 70</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 70</div>
        <div class="meta">Nodes 5 | Edges 4</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "497::n0", "label": "ESG-1", "title": "<b>ESG-1</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 497<br>Mentions: 7<br>Sent IDs: 0|1|2|3|4|6|7<br>Mentions:<br>name=美国海军第一个远征攻击群, sent_id=0, pos=[0, 12], type=ENTITY<br>name=远征攻击群, sent_id=1, pos=[1, 6], type=ENTITY<br>name=联合远征攻击群, sent_id=2, pos=[36, 43], type=ENTITY<br>name=ESG-1, sent_id=3, pos=[14, 19], type=ENTITY<br>name=ESG, sent_id=4, pos=[17, 20], type=ENTITY<br>name=ESG-1, sent_id=6, pos=[1, 6], type=ENTITY<br>name=ESG-1, sent_id=7, pos=[5, 10], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "497::n1", "label": "美国海军", "title": "<b>美国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 497<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=美国海军, sent_id=0, pos=[0, 4], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "497::n2", "label": "2003年8月份", "title": "<b>2003年8月份</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 497<br>Mentions: 1<br>Sent IDs: 7<br>Mentions:<br>name=2003年8月份, sent_id=7, pos=[11, 19], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "497::n3", "label": "南加利福尼亚", "title": "<b>南加利福尼亚</b><br>Type: ENTITY<br>Entity role: Area<br>Doc: 497<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=南加利福尼亚, sent_id=0, pos=[15, 21], type=ENTITY", "color": "#BFBFBF", "shape": "dot", "size": 18}, {"id": "497::n4", "label": "联合特种作战", "title": "<b>联合特种作战</b><br>Type: ENTITY<br>Entity role: Content<br>Doc: 497<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=联合特种作战, sent_id=0, pos=[24, 30], type=ENTITY", "color": "#BFBFBF", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "497::n1", "to": "497::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: ESG-1<br>Evidence sent IDs: 0|1|2|3|4|6|7<br>Evidence:<br>[0] 美国海军第一个远征攻击群最近在南加利福尼亚完成了联合特种作战演习。<br>[1]  远征攻击群概念于2002年9月成型。<br>[2] 自从这个概念公布后，第3舰队司令官和第1海军陆战队远征队已经为这支最大的联合远征攻击群的组织管理、人员配备和训练方面进行大量的工作。<br>[3]  在完成最后一次训练演习后，ESG-1目前准备进行部署，但离成功可能还需进行几个月的准备。<br>[4] 总共有6000名水兵和陆战队员参与ESG。<br>[6]  ESG-1由七艘舰艇组成，分别是佩勒留号两栖攻击舰、杰曼敦号两栖船坞登陆舰、奥格登号两栖船坞运输舰、皇家港号巡洋舰、德凯特号驱逐舰、贾勒特号护卫舰和格林维尔号攻击型核潜艇。<br>[7]  按计划，ESG-1在2003年8月份部署。", "width": 2, "arrows": "to"}, {"from": "497::n1", "to": "497::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 2003年8月份<br>Evidence sent IDs: 7<br>Evidence:<br>[7]  按计划，ESG-1在2003年8月份部署。", "width": 2, "arrows": "to"}, {"from": "497::n0", "to": "497::n3", "label": "演习", "title": "<b>演习</b><br>Relation: Manoeuvre__Area<br>Role: Area<br>Head entity: ESG-1<br>Tail entity: 南加利福尼亚<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 美国海军第一个远征攻击群最近在南加利福尼亚完成了联合特种作战演习。", "width": 2, "arrows": "to"}, {"from": "497::n0", "to": "497::n4", "label": "演习", "title": "<b>演习</b><br>Relation: Manoeuvre__Content<br>Role: Content<br>Head entity: ESG-1<br>Tail entity: 联合特种作战<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 美国海军第一个远征攻击群最近在南加利福尼亚完成了联合特种作战演习。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
