<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 71</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 71</div>
        <div class="meta">Nodes 6 | Edges 5</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "501::n0", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 501<br>Mentions: 2<br>Sent IDs: 0|5<br>Mentions:<br>name=美国, sent_id=0, pos=[2, 4], type=ENTITY<br>name=美国, sent_id=5, pos=[10, 12], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "501::n1", "label": "2005年之前", "title": "<b>2005年之前</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 501<br>Mentions: 1<br>Sent IDs: 5<br>Mentions:<br>name=2005年之前, sent_id=5, pos=[15, 22], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "501::n2", "label": "宙斯盾舰船", "title": "<b>宙斯盾舰船</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 501<br>Mentions: 1<br>Sent IDs: 5<br>Mentions:<br>name=宙斯盾舰船, sent_id=5, pos=[25, 30], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "501::n3", "label": "海基拦截器", "title": "<b>海基拦截器</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 501<br>Mentions: 1<br>Sent IDs: 5<br>Mentions:<br>name=海基拦截器, sent_id=5, pos=[36, 41], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "501::n4", "label": "2002年", "title": "<b>2002年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 501<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=2002年, sent_id=6, pos=[3, 8], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "501::n5", "label": "宙斯盾弹道导弹防御系统", "title": "<b>宙斯盾弹道导弹防御系统</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 501<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=宙斯盾弹道导弹防御系统, sent_id=6, pos=[11, 22], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "501::n0", "to": "501::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国<br>Tail entity: 2005年之前<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 根据总统布什的计划，美国计划在2005年之前在现有宙斯盾舰船上部署20套海基拦截器。", "width": 2, "arrows": "to"}, {"from": "501::n0", "to": "501::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 宙斯盾舰船<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 根据总统布什的计划，美国计划在2005年之前在现有宙斯盾舰船上部署20套海基拦截器。", "width": 2, "arrows": "to"}, {"from": "501::n0", "to": "501::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 海基拦截器<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 根据总统布什的计划，美国计划在2005年之前在现有宙斯盾舰船上部署20套海基拦截器。", "width": 2, "arrows": "to"}, {"from": "501::n0", "to": "501::n4", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 美国<br>Tail entity: 2002年<br>Evidence sent IDs: 6<br>Evidence:<br>[6]    2002年，装备宙斯盾弹道导弹防御系统的伊利湖巡洋舰连续3次使用SM-3导弹成功拦截了弹道导弹目标，而今年7月进行的第四次试验未能取得成功。", "width": 2, "arrows": "to"}, {"from": "501::n0", "to": "501::n5", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国<br>Tail entity: 宙斯盾弹道导弹防御系统<br>Evidence sent IDs: 6<br>Evidence:<br>[6]    2002年，装备宙斯盾弹道导弹防御系统的伊利湖巡洋舰连续3次使用SM-3导弹成功拦截了弹道导弹目标，而今年7月进行的第四次试验未能取得成功。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
