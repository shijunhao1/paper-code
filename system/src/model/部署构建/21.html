    const edgesData = [{"from": "159::n1", "to": "159::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 首尔<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 驻韩美军指挥官斯卡帕罗蒂陆军中将表示，美国正考虑在首尔部署末段高空区域防御系统，帮助韩国应对来自朝鲜不断增长的军事威胁。", "width": 2, "arrows": "to"}, {"from": "159::n1", "to": "159::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 末段高空区域防御系统<br>Evidence sent IDs: 1|3|5|6|8<br>Evidence:<br>[1] 韩国政府已经收到了爱国者PAC-3导弹防御系统和末段高空区域防御系统的信息，但尚未做出最终决定。<br>[3] 驻韩美军指挥官斯卡帕罗蒂陆军中将表示，美国正考虑在首尔部署末段高空区域防御系统，帮助韩国应对来自朝鲜不断增长的军事威胁。<br>[5] 美国计划在2015年12月将战时指挥权移交给韩国，而且已经在关岛部署了末段高空区域防御系统导弹连。<br>[6]  但韩国军方称，韩国并没有考虑末段高空区域防御系统，转而关注国内开发的导弹防御系统来拦截更高飞行高度的导弹。<br>[8] 韩国计划在国内生产远程防空导弹，能与洛克希德•马丁公司的末段高空区域防御系统相匹配。", "width": 2, "arrows": "to"}, {"from": "159::n3", "to": "159::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 关岛<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 美国计划在2015年12月将战时指挥权移交给韩国，而且已经在关岛部署了末段高空区域防御系统导弹连。", "width": 2, "arrows": "to"}, {"from": "159::n3", "to": "159::n5", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 末段高空区域防御系统导弹连<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 美国计划在2015年12月将战时指挥权移交给韩国，而且已经在关岛部署了末段高空区域防御系统导弹连。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
