<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 89</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 89</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "669::n0", "label": "JIM LR", "title": "<b>JIM LR</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 669<br>Mentions: 5<br>Sent IDs: 0|2|4|5|6<br>Mentions:<br>name=JIM LR便携式多功能目标捕获双目镜, sent_id=0, pos=[8, 27], type=ENTITY<br>name=JIM LR, sent_id=2, pos=[7, 13], type=ENTITY<br>name=JIM LR, sent_id=4, pos=[9, 15], type=ENTITY<br>name=JIM LR, sent_id=5, pos=[0, 6], type=ENTITY<br>name=JIM LR, sent_id=6, pos=[14, 20], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "669::n1", "label": "法国萨吉姆公司", "title": "<b>法国萨吉姆公司</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 669<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=法国萨吉姆公司, sent_id=0, pos=[0, 7], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "669::n2", "label": "阿富汗", "title": "<b>阿富汗</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 669<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=阿富汗, sent_id=0, pos=[33, 36], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "669::n1", "to": "669::n0", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 法国萨吉姆公司<br>Tail entity: JIM LR<br>Evidence sent IDs: 0|2|4|5|6<br>Evidence:<br>[0] 法国萨吉姆公司的JIM LR便携式多功能目标捕获双目镜将装备驻扎在阿富汗、服役于国际安全援助部队的波兰军队。<br>[2]        JIM LR重约2.8千克，集成了昼用彩色CCD摄像机、3-5微米热像仪、眼睛安全激光测距机、0.8微米激光指示器、GPS接收机和数字电子磁盘，还可连接附加的外部GPS接收机。<br>[4]        由于JIM LR集成了大量的电子设备，它的电源仅能维持3个小时，也可为其附加外部电源。<br>[5] JIM LR也可作为组件用于远程监视系统，它装备了CCIR视频接口和RS442用于远程控制。<br>[6] 可通过基于蓝牙的火警线系统对JIM LR进行控制，并与外围设备传输数据。", "width": 2, "arrows": "to"}, {"from": "669::n1", "to": "669::n2", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 法国萨吉姆公司<br>Tail entity: 阿富汗<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 法国萨吉姆公司的JIM LR便携式多功能目标捕获双目镜将装备驻扎在阿富汗、服役于国际安全援助部队的波兰军队。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
