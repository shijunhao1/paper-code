  </div>
  <script>
    const nodesData = [{"id": "1524::n0", "label": "韩国", "title": "<b>韩国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1524<br>Mentions: 2<br>Sent IDs: 0|3<br>Mentions:<br>name=韩国, sent_id=0, pos=[6, 8], type=ENTITY<br>name=韩国, sent_id=3, pos=[3, 5], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "1524::n1", "label": "导弹防御体系", "title": "<b>导弹防御体系</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 1524<br>Mentions: 3<br>Sent IDs: 0|2|4<br>Mentions:<br>name=导弹防御体系, sent_id=0, pos=[31, 37], type=ENTITY<br>name=导弹防御体系, sent_id=2, pos=[37, 43], type=ENTITY<br>name=导弹防御体系, sent_id=4, pos=[9, 15], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "1524::n2", "label": "朝鲜", "title": "<b>朝鲜</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1524<br>Mentions: 3<br>Sent IDs: 0|1|4<br>Mentions:<br>name=朝鲜, sent_id=0, pos=[44, 46], type=ENTITY<br>name=朝鲜, sent_id=1, pos=[3, 5], type=ENTITY<br>name=朝鲜, sent_id=4, pos=[32, 34], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "1524::n3", "label": "2020年中", "title": "<b>2020年中</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 1524<br>Mentions: 1<br>Sent IDs: 4<br>Mentions:<br>name=2020年中, sent_id=4, pos=[17, 23], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "1524::n4", "label": "上周", "title": "<b>上周</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 1524<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=上周, sent_id=1, pos=[0, 2], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "1524::n5", "label": "潜射弹道导弹", "title": "<b>潜射弹道导弹</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 1524<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=潜射弹道导弹, sent_id=1, pos=[27, 33], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "1524::n0", "to": "1524::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 韩国<br>Tail entity: 导弹防御体系<br>Evidence sent IDs: 0|2|4<br>Evidence:<br>[0] 8月30日，韩国政府宣布增加2017年国防预算来开发一套国产的导弹防御体系，以更好地应对朝鲜的导弹和核威胁。<br>[2]  韩国企划财政部称，2017年国防预算将增加至361亿美元，用于构建韩国型导弹防御体系，比2016年增长4%。<br>[4]  根据计划，韩国型导弹防御体系将于2020年中部署，包括能够拦截朝鲜发射的导弹的中程地空导弹、远程地空导弹、美国爱国者导弹和预警雷达。", "width": 2, "arrows": "to"}, {"from": "1524::n0", "to": "1524::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 韩国<br>Tail entity: 2020年中<br>Evidence sent IDs: 4<br>Evidence:<br>[4]  根据计划，韩国型导弹防御体系将于2020年中部署，包括能够拦截朝鲜发射的导弹的中程地空导弹、远程地空导弹、美国爱国者导弹和预警雷达。", "width": 2, "arrows": "to"}, {"from": "1524::n2", "to": "1524::n4", "label": "试射", "title": "<b>试射</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 朝鲜<br>Tail entity: 上周<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 上周，朝鲜针对韩美开展的乙支自由卫士联合军演试射了一枚潜射弹道导弹。", "width": 2, "arrows": "to"}, {"from": "1524::n2", "to": "1524::n5", "label": "试射", "title": "<b>试射</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 朝鲜<br>Tail entity: 潜射弹道导弹<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 上周，朝鲜针对韩美开展的乙支自由卫士联合军演试射了一枚潜射弹道导弹。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
