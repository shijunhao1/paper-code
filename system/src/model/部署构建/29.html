<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 29</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 29</div>
        <div class="meta">Nodes 5 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "211::n0", "label": "天赋号", "title": "<b>天赋号</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 211<br>Mentions: 4<br>Sent IDs: 0|1|3<br>Mentions:<br>name=特拉法加级攻击核潜艇天赋号, sent_id=0, pos=[46, 59], type=ENTITY<br>name=天赋号, sent_id=1, pos=[17, 20], type=ENTITY<br>name=天赋号, sent_id=1, pos=[34, 37], type=ENTITY<br>name=天赋号, sent_id=3, pos=[5, 8], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "211::n1", "label": "西班牙", "title": "<b>西班牙</b><br>Type: ENTITY<br>Entity role: Unknown<br>Doc: 211<br>Mentions: 4<br>Sent IDs: 0|1|2<br>Mentions:<br>name=西班牙, sent_id=0, pos=[69, 72], type=ENTITY<br>name=西班牙, sent_id=1, pos=[8, 11], type=ENTITY<br>name=西班牙, sent_id=2, pos=[29, 32], type=ENTITY<br>name=西班牙, sent_id=2, pos=[61, 64], type=ENTITY", "color": "#BFBFBF", "shape": "dot", "size": 18}, {"id": "211::n2", "label": "英国直布罗陀属地", "title": "<b>英国直布罗陀属地</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 211<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=英国直布罗陀属地, sent_id=0, pos=[35, 43], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "211::n3", "label": "英国", "title": "<b>英国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 211<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=英国, sent_id=0, pos=[35, 37], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "211::n4", "label": "西班牙", "title": "<b>西班牙</b><br>Type: ENTITY<br>Entity role: Object<br>Doc: 211<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=西班牙, sent_id=1, pos=[45, 48], type=ENTITY", "color": "#78D3F8", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "211::n3", "to": "211::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 英国<br>Tail entity: 英国直布罗陀属地<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 　　[环球网军事9月24日报道]据英国《太阳报》9月20日报道，部署在英国直布罗陀属地的一艘特拉法加级攻击核潜艇天赋号在近日出港时，遭到了西班牙海事国民卫队一艘巡逻舰的近距离跟踪干扰。", "width": 2, "arrows": "to"}, {"from": "211::n3", "to": "211::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 英国<br>Tail entity: 天赋号<br>Evidence sent IDs: 0|1|3<br>Evidence:<br>[0] 　　[环球网军事9月24日报道]据英国《太阳报》9月20日报道，部署在英国直布罗陀属地的一艘特拉法加级攻击核潜艇天赋号在近日出港时，遭到了西班牙海事国民卫队一艘巡逻舰的近距离跟踪干扰。<br>[1]    　　报道称西班牙的巡逻舰围绕天赋号进行绕圈航行，正在水面航行的天赋号随即发射信号弹对西班牙巡逻舰进行警告。<br>[3]    　　天赋号是特拉法尔加级核潜艇的第6艘，服役于1990年5月12日，按计划，该艇将在未来3年内退役，被机敏级核潜艇所取代。", "width": 2, "arrows": "to"}, {"from": "211::n3", "to": "211::n4", "label": "警告", "title": "<b>警告</b><br>Relation: Conflict__Object<br>Role: Object<br>Head entity: 英国<br>Tail entity: 西班牙<br>Evidence sent IDs: 1<br>Evidence:<br>[1]    　　报道称西班牙的巡逻舰围绕天赋号进行绕圈航行，正在水面航行的天赋号随即发射信号弹对西班牙巡逻舰进行警告。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
