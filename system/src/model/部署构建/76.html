<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>Document Graph: 76</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 76</div>
        <div class="meta">Nodes 5 | Edges 4</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "551::n0", "label": "印度陆军", "title": "<b>印度陆军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 551<br>Mentions: 3<br>Sent IDs: 0|2|3<br>Mentions:<br>name=印度陆军, sent_id=0, pos=[33, 37], type=ENTITY<br>name=印度陆军, sent_id=2, pos=[7, 11], type=ENTITY<br>name=印度陆军, sent_id=3, pos=[40, 44], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "551::n1", "label": "导弹", "title": "<b>导弹</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 551<br>Mentions: 4<br>Sent IDs: 0|1|2|3<br>Mentions:<br>name=PJ-10超音速中程地对地  布拉莫斯导弹, sent_id=0, pos=[37, 58], type=ENTITY<br>name=导弹, sent_id=1, pos=[0, 2], type=ENTITY<br>name=导弹, sent_id=2, pos=[55, 57], type=ENTITY<br>name=空基型布拉莫斯导弹, sent_id=3, pos=[0, 9], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "551::n2", "label": "2009年", "title": "<b>2009年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 551<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=2009年, sent_id=3, pos=[11, 16], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "551::n3", "label": "2007年6月", "title": "<b>2007年6月</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 551<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=2007年6月, sent_id=2, pos=[12, 19], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "551::n4", "label": "超音速巡航导弹", "title": "<b>超音速巡航导弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 551<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=超音速巡航导弹, sent_id=2, pos=[24, 31], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "551::n0", "to": "551::n1", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 印度陆军<br>Tail entity: 导弹<br>Evidence sent IDs: 0|1|2|3<br>Evidence:<br>[0] 印度-俄罗斯联合组建的联合企业布拉莫斯航宇公司表示，该公司近日获得印度陆军PJ-10超音速中程地对地  布拉莫斯导弹的新定单。<br>[1] 导弹采购量和合同总额尚未有消息透露。<br>[2]        印度陆军于2007年6月首次装备该超音速巡航导弹，其中包括4套移动式自动发射装置，每套可携带3枚导弹。<br>[3] 空基型布拉莫斯导弹将于2009年以印度空军Su-30MKI为平台进行试验，并装备印度陆军和海军。", "width": 2, "arrows": "to"}, {"from": "551::n0", "to": "551::n2", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 印度陆军<br>Tail entity: 2009年<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 空基型布拉莫斯导弹将于2009年以印度空军Su-30MKI为平台进行试验，并装备印度陆军和海军。", "width": 2, "arrows": "to"}, {"from": "551::n0", "to": "551::n3", "label": "装备", "title": "<b>装备</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 印度陆军<br>Tail entity: 2007年6月<br>Evidence sent IDs: 2<br>Evidence:<br>[2]        印度陆军于2007年6月首次装备该超音速巡航导弹，其中包括4套移动式自动发射装置，每套可携带3枚导弹。", "width": 2, "arrows": "to"}, {"from": "551::n0", "to": "551::n4", "label": "装备", "title": "<b>装备</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 印度陆军<br>Tail entity: 超音速巡航导弹<br>Evidence sent IDs: 2<br>Evidence:<br>[2]        印度陆军于2007年6月首次装备该超音速巡航导弹，其中包括4套移动式自动发射装置，每套可携带3枚导弹。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
