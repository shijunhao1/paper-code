<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 103</div>
        <div class="meta">Nodes 4 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "761::n0", "label": "美国海军", "title": "<b>美国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 761<br>Mentions: 2<br>Sent IDs: 0|4<br>Mentions:<br>name=美国海军, sent_id=0, pos=[0, 4], type=ENTITY<br>name=美国海军, sent_id=4, pos=[20, 24], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "761::n1", "label": "近海战斗舰", "title": "<b>近海战斗舰</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 761<br>Mentions: 5<br>Sent IDs: 0|1|5|6|7<br>Mentions:<br>name=近海战斗舰, sent_id=0, pos=[24, 29], type=ENTITY<br>name=近海战斗舰, sent_id=1, pos=[9, 14], type=ENTITY<br>name=近海战斗舰, sent_id=5, pos=[7, 12], type=ENTITY<br>name=近海战斗舰, sent_id=6, pos=[5, 10], type=ENTITY<br>name=近海战斗舰, sent_id=7, pos=[0, 5], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "761::n2", "label": "梅波特海军基地", "title": "<b>梅波特海军基地</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 761<br>Mentions: 4<br>Sent IDs: 0|2|4|5<br>Mentions:<br>name=梅波特海军基地, sent_id=0, pos=[38, 45], type=ENTITY<br>name=梅波特海军基地, sent_id=2, pos=[16, 23], type=ENTITY<br>name=梅波特海军基地, sent_id=4, pos=[27, 34], type=ENTITY<br>name=梅波特海军基地, sent_id=5, pos=[19, 26], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "761::n3", "label": "2016年", "title": "<b>2016年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 761<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=2016年, sent_id=0, pos=[31, 36], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "761::n0", "to": "761::n1", "label": "进驻", "title": "<b>进驻</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: 近海战斗舰<br>Evidence sent IDs: 0|1|5|6|7<br>Evidence:<br>[0] 美国海军作战部长加里・罗海德上将表示，首批东海岸近海战斗舰将在2016年进驻梅波特海军基地。<br>[1] 目前已经服役的2艘近海战斗舰最初被安置在圣迭戈海军基地。<br>[5]  罗海德上将称近海战斗舰将会被用来取代梅波特海军基地的护卫舰。<br>[6] 他还表示，近海战斗舰将在美国南方司令部的作战行动中发挥作用，南方司令部的职责是随时监视中美洲以及拉丁美洲的动向。<br>[7] 近海战斗舰将要执行的作战任务包括反毒品行动以及海上合作项目等，与首艘近海战斗舰自由号目前正在执行的任务类似。", "width": 2, "arrows": "to"}, {"from": "761::n0", "to": "761::n3", "label": "进驻", "title": "<b>进驻</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 2016年<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 美国海军作战部长加里・罗海德上将表示，首批东海岸近海战斗舰将在2016年进驻梅波特海军基地。", "width": 2, "arrows": "to"}, {"from": "761::n0", "to": "761::n2", "label": "进驻", "title": "<b>进驻</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国海军<br>Tail entity: 梅波特海军基地<br>Evidence sent IDs: 0|2|4|5<br>Evidence:<br>[0] 美国海军作战部长加里・罗海德上将表示，首批东海岸近海战斗舰将在2016年进驻梅波特海军基地。<br>[2]  在常规情况下，位于福罗里达州的梅波特海军基地一般作为1艘航母、少部分的巡洋舰、驱逐舰以及12艘护卫舰的母港。<br>[4] 根据美国最近发布的《四年一度防务评审》，美国海军将要把梅波特海军基地进行升级，以便能够允许1艘核动力航母进驻。<br>[5]  罗海德上将称近海战斗舰将会被用来取代梅波特海军基地的护卫舰。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
