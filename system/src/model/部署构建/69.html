<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 69</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 69</div>
        <div class="meta">Nodes 5 | Edges 4</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "494::n0", "label": "默林直升机", "title": "<b>默林直升机</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 494<br>Mentions: 3<br>Sent IDs: 0|1|6<br>Mentions:<br>name=默林直升机, sent_id=0, pos=[28, 33], type=ENTITY<br>name=默林MK1型直升机, sent_id=1, pos=[6, 15], type=ENTITY<br>name=直升机, sent_id=6, pos=[49, 52], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "494::n1", "label": "英国海军", "title": "<b>英国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 494<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=英国海军, sent_id=1, pos=[1, 5], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "494::n2", "label": "1999年", "title": "<b>1999年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 494<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=1999年, sent_id=2, pos=[5, 10], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "494::n3", "label": "航母", "title": "<b>航母</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 494<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=航母, sent_id=2, pos=[26, 28], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "494::n4", "label": "23型护卫舰", "title": "<b>23型护卫舰</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 494<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=23型护卫舰, sent_id=2, pos=[29, 35], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "494::n1", "to": "494::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 英国海军<br>Tail entity: 默林直升机<br>Evidence sent IDs: 0|1|2|6<br>Evidence:<br>[0] 根据英国国防采办大臣巴赫当日宣布的一项计划，为进一步提高默林直升机的性能，使直升机技术在未来20～30年中仍保持领先，近期内将开始对其进行总体的改进。<br>[1]  英国海军的默林MK1型直升机是一种多用途直升机，具备反潜、反舰、搜索和救援、人员和物资调运以及运送作战部队等功能。<br>[2] 该型直升机1999年正式入役，共有44架，分别部署在航母和23型护卫舰上。<br>[6] 该阶段的费用为1800万英镑，其目的是寻求在提升直升机性能方面最具效费比的途径，同时还将进一步提高直升机的功能，尤其是地面监视的能力。", "width": 2.5, "arrows": "to"}, {"from": "494::n1", "to": "494::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 英国海军<br>Tail entity: 1999年<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 该型直升机1999年正式入役，共有44架，分别部署在航母和23型护卫舰上。", "width": 2.5, "arrows": "to"}, {"from": "494::n1", "to": "494::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 英国海军<br>Tail entity: 航母<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 该型直升机1999年正式入役，共有44架，分别部署在航母和23型护卫舰上。", "width": 2, "arrows": "to"}, {"from": "494::n1", "to": "494::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 英国海军<br>Tail entity: 23型护卫舰<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 该型直升机1999年正式入役，共有44架，分别部署在航母和23型护卫舰上。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
