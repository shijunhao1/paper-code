<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 38</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 38</div>
        <div class="meta">Nodes 4 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "250::n0", "label": "F-16", "title": "<b>F-16</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 250<br>Mentions: 4<br>Sent IDs: 2|3<br>Mentions:<br>name=F-16战斗机, sent_id=2, pos=[63, 70], type=ENTITY<br>name=F-16, sent_id=2, pos=[85, 89], type=ENTITY<br>name=F-16, sent_id=2, pos=[99, 103], type=ENTITY<br>name=F-16, sent_id=3, pos=[11, 15], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "250::n1", "label": "新加坡空军", "title": "<b>新加坡空军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 250<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=新加坡空军, sent_id=2, pos=[0, 5], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "250::n2", "label": "F-16中队", "title": "<b>F-16中队</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 250<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=F-16中队, sent_id=2, pos=[75, 81], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "250::n3", "label": "新加坡市", "title": "<b>新加坡市</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 250<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=新加坡市, sent_id=2, pos=[92, 96], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "250::n1", "to": "250::n2", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 新加坡空军<br>Tail entity: F-16中队<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 新加坡空军装备有单座型F-16C Block 52、双座型F-16D Block 52和F-16D Block 52+等60架F-16战斗机，其中3个F-16中队、48架F-16驻扎在新加坡市，其余F-16在美国亚利桑那州进行训练。", "width": 2, "arrows": "to"}, {"from": "250::n1", "to": "250::n0", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 新加坡空军<br>Tail entity: F-16<br>Evidence sent IDs: 2|3<br>Evidence:<br>[2] 新加坡空军装备有单座型F-16C Block 52、双座型F-16D Block 52和F-16D Block 52+等60架F-16战斗机，其中3个F-16中队、48架F-16驻扎在新加坡市，其余F-16在美国亚利桑那州进行训练。<br>[3] 目前，新加坡空军正在对F-16进行主动电子扫描阵列雷达、任务计算机和其他航电设备升级。", "width": 2, "arrows": "to"}, {"from": "250::n1", "to": "250::n3", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 新加坡空军<br>Tail entity: 新加坡市<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 新加坡空军装备有单座型F-16C Block 52、双座型F-16D Block 52和F-16D Block 52+等60架F-16战斗机，其中3个F-16中队、48架F-16驻扎在新加坡市，其余F-16在美国亚利桑那州进行训练。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
