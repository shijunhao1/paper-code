<!DOCTYPE html>

  <style>

</head>
<body>

      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>

    </div>
  </div>
  <script>
    const nodesData = [{"id": "205::n0", "label": "陆上自卫队", "title": "<b>陆上自卫队</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 205<br>Mentions: 2<br>Sent IDs: 0|6<br>Mentions:<br>name=陆上自卫队, sent_id=0, pos=[41, 46], type=ENTITY<br>name=日本陆上自卫队, sent_id=6, pos=[15, 22], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "205::n1", "label": "2016年3月", "title": "<b>2016年3月</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 205<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=2016年3月, sent_id=6, pos=[23, 30], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "205::n2", "label": "冲绳县的与那国岛", "title": "<b>冲绳县的与那国岛</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 205<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=冲绳县的与那国岛, sent_id=6, pos=[31, 39], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "205::n3", "label": "沿岸监视部队", "title": "<b>沿岸监视部队</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 205<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=沿岸监视部队, sent_id=6, pos=[50, 56], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "205::n4", "label": "岸舰导弹", "title": "<b>岸舰导弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 205<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=岸舰导弹, sent_id=6, pos=[95, 99], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "205::n0", "to": "205::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 陆上自卫队<br>Tail entity: 2016年3月<br>Evidence sent IDs: 6<br>Evidence:<br>[6] 报道称，为对抗中方的海上存在，日本陆上自卫队于2016年3月在冲绳县的与那国岛部署了约160人规模的沿岸监视部队，此外还在冲绳县的宫古岛、石垣岛、鹿儿岛县的奄美大岛上新组建了警备部队，部署了岸舰导弹。", "width": 2, "arrows": "to"}, {"from": "205::n0", "to": "205::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 陆上自卫队<br>Tail entity: 冲绳县的与那国岛<br>Evidence sent IDs: 6<br>Evidence:<br>[6] 报道称，为对抗中方的海上存在，日本陆上自卫队于2016年3月在冲绳县的与那国岛部署了约160人规模的沿岸监视部队，此外还在冲绳县的宫古岛、石垣岛、鹿儿岛县的奄美大岛上新组建了警备部队，部署了岸舰导弹。", "width": 2, "arrows": "to"}, {"from": "205::n0", "to": "205::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 陆上自卫队<br>Tail entity: 沿岸监视部队<br>Evidence sent IDs: 6<br>Evidence:<br>[6] 报道称，为对抗中方的海上存在，日本陆上自卫队于2016年3月在冲绳县的与那国岛部署了约160人规模的沿岸监视部队，此外还在冲绳县的宫古岛、石垣岛、鹿儿岛县的奄美大岛上新组建了警备部队，部署了岸舰导弹。", "width": 2, "arrows": "to"}, {"from": "205::n0", "to": "205::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 陆上自卫队<br>Tail entity: 岸舰导弹<br>Evidence sent IDs: 6<br>Evidence:<br>[6] 报道称，为对抗中方的海上存在，日本陆上自卫队于2016年3月在冲绳县的与那国岛部署了约160人规模的沿岸监视部队，此外还在冲绳县的宫古岛、石垣岛、鹿儿岛县的奄美大岛上新组建了警备部队，部署了岸舰导弹。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
