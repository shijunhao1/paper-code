    const edgesData = [{"from": "187::n0", "to": "187::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 德国西部<br>Evidence sent IDs: 1<br>Evidence:<br>[1]  周二早些时候，德国媒体报道称美国将在德国西部部署20枚B-61核弹，这包含在2015年美国的预算中。", "width": 2, "arrows": "to"}, {"from": "187::n0", "to": "187::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: B-61核弹<br>Evidence sent IDs: 1|5|6|9<br>Evidence:<br>[1]  周二早些时候，德国媒体报道称美国将在德国西部部署20枚B-61核弹，这包含在2015年美国的预算中。<br>[5]  7月1日，美国进行B61-12核弹的飞行测试。<br>[6] 该测试是美国计划的一部分，以延长B-61炸弹的使用寿命，并更新核武库。<br>[9]  据ZDF电视频道，德国西部布尔切的联邦德国国防军空军基地已经开始准备接收美国新型B61-12核弹，20枚核弹的爆炸当量相当于在广岛爆炸原子弹的80倍。", "width": 2, "arrows": "to"}, {"from": "187::n0", "to": "187::n3", "label": "测试", "title": "<b>测试</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 美国<br>Tail entity: 7月1日<br>Evidence sent IDs: 5<br>Evidence:<br>[5]  7月1日，美国进行B61-12核弹的飞行测试。", "width": 2, "arrows": "to"}, {"from": "187::n0", "to": "187::n1", "label": "测试", "title": "<b>测试</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国<br>Tail entity: B-61核弹<br>Evidence sent IDs: 1|5|6|9<br>Evidence:<br>[1]  周二早些时候，德国媒体报道称美国将在德国西部部署20枚B-61核弹，这包含在2015年美国的预算中。<br>[5]  7月1日，美国进行B61-12核弹的飞行测试。<br>[6] 该测试是美国计划的一部分，以延长B-61炸弹的使用寿命，并更新核武库。<br>[9]  据ZDF电视频道，德国西部布尔切的联邦德国国防军空军基地已经开始准备接收美国新型B61-12核弹，20枚核弹的爆炸当量相当于在广岛爆炸原子弹的80倍。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
