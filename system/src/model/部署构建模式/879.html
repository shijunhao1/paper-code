<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 879</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 879</div>
        <div class="meta">Nodes 4 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "879::n0", "label": "铁穹防空系统", "title": "<b>铁穹防空系统</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 879<br>Mentions: 5<br>Sent IDs: 0|2|6|7|9<br>Mentions:<br>name=铁穹防空系统, sent_id=0, pos=[24, 30], type=ENTITY<br>name=铁穹防空系统, sent_id=2, pos=[0, 7], type=ENTITY<br>name=铁穹防御系统, sent_id=6, pos=[43, 49], type=ENTITY<br>name=铁穹, sent_id=7, pos=[25, 27], type=ENTITY<br>name=铁穹武器系统, sent_id=9, pos=[0, 6], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "879::n1", "label": "伊拉克", "title": "<b>伊拉克</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 879<br>Mentions: 2<br>Sent IDs: 6<br>Mentions:<br>name=伊拉克, sent_id=6, pos=[6, 9], type=ENTITY<br>name=伊拉克, sent_id=6, pos=[36, 39], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "879::n2", "label": "美军", "title": "<b>美军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 879<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=美军, sent_id=6, pos=[1, 3], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "879::n3", "label": "阿富汗", "title": "<b>阿富汗</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 879<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=阿富汗, sent_id=6, pos=[32, 35], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "879::n2", "to": "879::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美军<br>Tail entity: 阿富汗<br>Evidence sent IDs: 6<br>Evidence:<br>[6]  美军已经在伊拉克发现了有潜在威胁的107毫米火箭弹，正在考虑在阿富汗和伊拉克前线部署铁穹防御系统。", "width": 2, "arrows": "to"}, {"from": "879::n2", "to": "879::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美军<br>Tail entity: 伊拉克<br>Evidence sent IDs: 6<br>Evidence:<br>[6]  美军已经在伊拉克发现了有潜在威胁的107毫米火箭弹，正在考虑在阿富汗和伊拉克前线部署铁穹防御系统。", "width": 2, "arrows": "to"}, {"from": "879::n2", "to": "879::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美军<br>Tail entity: 铁穹防空系统<br>Evidence sent IDs: 0|2|6|7|9<br>Evidence:<br>[0] 美国陆军已经对以色列拉法尔先进防务系统公司研发的铁穹防空系统表现出了浓厚的兴趣，目前正在起草一份官方的需求声明，只是还没有确定具体的时间节点。<br>[2]  铁穹防空系统设计用来防御4千米～70千米范围内的火箭弹。<br>[6]  美军已经在伊拉克发现了有潜在威胁的107毫米火箭弹，正在考虑在阿富汗和伊拉克前线部署铁穹防御系统。<br>[7] 拉法尔公司表示，正在与雷声公司展开合作，向美国销售铁穹。<br>[9] 铁穹武器系统可以无缝集成C-RAM近防系统，提供多层防御。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
