<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 874</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 874</div>
        <div class="meta">Nodes 2 | Edges 1</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "874::n0", "label": "Thales集团", "title": "<b>Thales集团</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 874<br>Mentions: 4<br>Sent IDs: 0|1|2|5<br>Mentions:<br>name=Thales集团, sent_id=0, pos=[0, 8], type=ENTITY<br>name=Thales集团, sent_id=1, pos=[5, 13], type=ENTITY<br>name=Thales集团, sent_id=2, pos=[12, 20], type=ENTITY<br>name=Thales集团, sent_id=5, pos=[0, 8], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "874::n1", "label": "BDSP", "title": "<b>BDSP</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 874<br>Mentions: 10<br>Sent IDs: 0|1|2|3|5|6|7<br>Mentions:<br>name=公共安全数据库, sent_id=0, pos=[21, 28], type=ENTITY<br>name=BDSP, sent_id=0, pos=[29, 33], type=ENTITY<br>name=BDSP系统, sent_id=1, pos=[15, 21], type=ENTITY<br>name=BDSP, sent_id=2, pos=[0, 4], type=ENTITY<br>name=BDSP系统, sent_id=3, pos=[1, 7], type=ENTITY<br>name=BDSP, sent_id=5, pos=[9, 13], type=ENTITY<br>name=中央数据库, sent_id=6, pos=[39, 44], type=ENTITY<br>name=中央数据库, sent_id=6, pos=[48, 53], type=ENTITY<br>name=BDSP, sent_id=7, pos=[42, 46], type=ENTITY<br>name=系统, sent_id=7, pos=[52, 54], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "874::n0", "to": "874::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: Thales集团<br>Tail entity: BDSP<br>Evidence sent IDs: 0|1|2|3|5|6|7<br>Evidence:<br>[0] Thales集团已经成功为法国宪兵部署首个公共安全数据库，BDSP是用来指挥作战及处理作战信息的指挥信息系统。<br>[1] 这意味着，Thales集团通过BDSP系统能够使整个法国本土及法国海外省和地区的作战管理及作战信息应用实现统一和现代化。<br>[2] BDSP的成功部署代表了Thales集团有能力应对不断变化的挑战和处理军队面临的安全职责。<br>[3]  BDSP系统允许从指挥中心级别到巡逻级别的宪兵都可访问所有和任务或干预相关的有用信息的摘要。<br>[5] Thales集团的BDSP解决方案，为国家和地方的宪兵提供了丰富的信息。<br>[6] 最终，这将使得分布在超过4300个站点的大约60000个宪兵永久使用并补充完善中央数据库的数据，中央数据库配置一个基于语义的搜索引擎以及性能极高的作战情报分析和挖掘工具。<br>[7] Thales集团国防和安全C4I系统高级副总裁Pascale Sourisse表示，BDSP是一种高效的系统，能够汇总大量的信息并实时提供给宪兵，帮助了他们有效的执行地面任务。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
