<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;

      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 1184</div>
        <div class="meta">Nodes 5 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "1184::n0", "label": "英国", "title": "<b>英国</b><br>Type: ENTITY<br>Entity role: Unknown<br>Doc: 1184<br>Mentions: 3<br>Sent IDs: 0|1|5<br>Mentions:<br>name=英国, sent_id=0, pos=[12, 14], type=ENTITY<br>name=英国, sent_id=1, pos=[0, 2], type=ENTITY<br>name=英国, sent_id=5, pos=[24, 26], type=ENTITY", "color": "#BFBFBF", "shape": "dot", "size": 18}, {"id": "1184::n1", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1184<br>Mentions: 4<br>Sent IDs: 0|3|5|10<br>Mentions:<br>name=美国, sent_id=0, pos=[17, 19], type=ENTITY<br>name=美国, sent_id=3, pos=[16, 18], type=ENTITY<br>name=美国, sent_id=5, pos=[15, 17], type=ENTITY<br>name=美国, sent_id=10, pos=[6, 8], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "1184::n2", "label": "防卫系统", "title": "<b>防卫系统</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 1184<br>Mentions: 4<br>Sent IDs: 0|2|6<br>Mentions:<br>name=导弹防卫系统, sent_id=0, pos=[28, 34], type=ENTITY<br>name=星球战争之子, sent_id=2, pos=[25, 31], type=ENTITY<br>name=防卫系统, sent_id=2, pos=[32, 36], type=ENTITY<br>name=防卫系统, sent_id=6, pos=[17, 21], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "1184::n3", "label": "英国", "title": "<b>英国</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 1184<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=英国, sent_id=0, pos=[42, 44], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "1184::n4", "label": "朝鲜", "title": "<b>朝鲜</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1184<br>Mentions: 1<br>Sent IDs: 10<br>Mentions:<br>name=朝鲜, sent_id=10, pos=[3, 5], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "1184::n1", "to": "1184::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 防卫系统<br>Evidence sent IDs: 0|2|6<br>Evidence:<br>[0] 英国报章3月30日报道，英国准备让美国把一项还在研究中的导弹防卫系统的主要部分部署在英国本土。<br>[2] 政府消息人士告诉两家报章，布莱尔首相愿意让这个外号星球战争之子的防卫系统属下的一座监听站设在英国本土。<br>[6] 反对计划的国家，包括法国和德国担心防卫系统会破坏美苏在1972年签署的反弹道导弹条约，并引发新一轮军备竞赛。", "width": 2, "arrows": "to"}, {"from": "1184::n1", "to": "1184::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 英国<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 英国报章3月30日报道，英国准备让美国把一项还在研究中的导弹防卫系统的主要部分部署在英国本土。", "width": 2, "arrows": "to"}, {"from": "1184::n4", "to": "1184::n1", "label": "攻击", "title": "<b>攻击</b><br>Relation: Conflict__Object<br>Role: Object<br>Head entity: 朝鲜<br>Tail entity: 美国<br>Evidence sent IDs: 0|3|5|10<br>Evidence:<br>[0] 英国报章3月30日报道，英国准备让美国把一项还在研究中的导弹防卫系统的主要部分部署在英国本土。<br>[3] 这个系统的作用在于侦察和摧毁射向美国的敌对导弹。<br>[5] 但是，布莱尔的发言人后来澄清，美国并没有正式要求英国支持这个计划。<br>[10] 它可对朝鲜向美国发动的核子攻击提供警报。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
