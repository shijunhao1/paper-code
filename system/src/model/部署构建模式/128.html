<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 128</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 128</div>
        <div class="meta">Nodes 4 | Edges 5</div>

      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "128::n0", "label": "LRASM", "title": "<b>LRASM</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 128<br>Mentions: 4<br>Sent IDs: 1|4|5<br>Mentions:<br>name=LRASM, sent_id=1, pos=[8, 13], type=ENTITY<br>name=LRASM, sent_id=4, pos=[3, 8], type=ENTITY<br>name=舰射型LRASM, sent_id=5, pos=[3, 11], type=ENTITY<br>name=LRASM, sent_id=5, pos=[26, 31], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "128::n1", "label": "美国海军", "title": "<b>美国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 128<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=美国海军, sent_id=0, pos=[0, 4], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "128::n2", "label": "未来几年内", "title": "<b>未来几年内</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 128<br>Mentions: 1<br>Sent IDs: 5<br>Mentions:<br>name=未来几年内, sent_id=5, pos=[34, 39], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "128::n3", "label": "B-1B轰炸机", "title": "<b>B-1B轰炸机</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 128<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=B-1B轰炸机, sent_id=1, pos=[14, 21], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "128::n1", "to": "128::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: LRASM<br>Evidence sent IDs: 1|4|5<br>Evidence:<br>[1] 在近期的实验中，LRASM由B-1B轰炸机发射，目标为三个驱逐舰大小的无人靶舰，导弹根据GPS系统预先设定的路径飞行数百千米后转入自动搜索模式，探测目标舰艇的电磁或图像信号，捕获目标后对其发动攻击。<br>[4] 目前的LRASM是根据现有的远程炸弹发展的，弹上制导系统进行了大量改进。<br>[5] 明年，舰射型LRASM计划将进行2次垂发测试，第一种LRASM计划于未来几年内部署，而弹上的传感器和电子对抗设施将在导弹服役后继续进行研发。", "width": 2, "arrows": "to"}, {"from": "128::n1", "to": "128::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 未来几年内<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 明年，舰射型LRASM计划将进行2次垂发测试，第一种LRASM计划于未来几年内部署，而弹上的传感器和电子对抗设施将在导弹服役后继续进行研发。", "width": 2, "arrows": "to"}, {"from": "128::n1", "to": "128::n0", "label": "测试", "title": "<b>测试</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国海军<br>Tail entity: LRASM<br>Evidence sent IDs: 1|4|5<br>Evidence:<br>[1] 在近期的实验中，LRASM由B-1B轰炸机发射，目标为三个驱逐舰大小的无人靶舰，导弹根据GPS系统预先设定的路径飞行数百千米后转入自动搜索模式，探测目标舰艇的电磁或图像信号，捕获目标后对其发动攻击。<br>[4] 目前的LRASM是根据现有的远程炸弹发展的，弹上制导系统进行了大量改进。<br>[5] 明年，舰射型LRASM计划将进行2次垂发测试，第一种LRASM计划于未来几年内部署，而弹上的传感器和电子对抗设施将在导弹服役后继续进行研发。", "width": 2, "arrows": "to"}, {"from": "128::n1", "to": "128::n0", "label": "发射", "title": "<b>发射</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国海军<br>Tail entity: LRASM<br>Evidence sent IDs: 1|4|5<br>Evidence:<br>[1] 在近期的实验中，LRASM由B-1B轰炸机发射，目标为三个驱逐舰大小的无人靶舰，导弹根据GPS系统预先设定的路径飞行数百千米后转入自动搜索模式，探测目标舰艇的电磁或图像信号，捕获目标后对其发动攻击。<br>[4] 目前的LRASM是根据现有的远程炸弹发展的，弹上制导系统进行了大量改进。<br>[5] 明年，舰射型LRASM计划将进行2次垂发测试，第一种LRASM计划于未来几年内部署，而弹上的传感器和电子对抗设施将在导弹服役后继续进行研发。", "width": 2, "arrows": "to"}, {"from": "128::n1", "to": "128::n3", "label": "发射", "title": "<b>发射</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国海军<br>Tail entity: B-1B轰炸机<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 在近期的实验中，LRASM由B-1B轰炸机发射，目标为三个驱逐舰大小的无人靶舰，导弹根据GPS系统预先设定的路径飞行数百千米后转入自动搜索模式，探测目标舰艇的电磁或图像信号，捕获目标后对其发动攻击。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
