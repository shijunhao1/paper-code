    const edgesData = [{"from": "155::n0", "to": "155::n2", "label": "测试", "title": "<b>测试</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 年底之前<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 美国海军将在年底之前对诺.格公司生产的的MQ-8C火力侦察兵进行舰载测试，以评估其在强电磁环境下的作战能力。", "width": 2, "arrows": "to"}, {"from": "155::n0", "to": "155::n1", "label": "测试", "title": "<b>测试</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国海军<br>Tail entity: MQ-8C<br>Evidence sent IDs: 0|2|4|5<br>Evidence:<br>[0] 美国海军将在年底之前对诺.格公司生产的的MQ-8C火力侦察兵进行舰载测试，以评估其在强电磁环境下的作战能力。<br>[2]    MQ-8C拥有一个较大的直升机机身，同时美海军在充分吸取之前的经验教训后专门设计了一个现代的电子屏蔽装置法拉第笼来保护飞机上敏感电子设备免受信号干扰。<br>[4]      与MQ-8B型无人直升机相比，MQ-8C的续航时间增加了一倍，有效载荷增大了两倍，出于节约成本和时间的考虑，几乎95%的MQ-8B最后都被重新改装成MQ-8C。<br>[5] MQ-8C无人直升机自从2013年10月31日首次部署后已经飞行了102架次。", "width": 2, "arrows": "to"}, {"from": "155::n0", "to": "155::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: MQ-8C<br>Evidence sent IDs: 0|2|4|5<br>Evidence:<br>[0] 美国海军将在年底之前对诺.格公司生产的的MQ-8C火力侦察兵进行舰载测试，以评估其在强电磁环境下的作战能力。<br>[2]    MQ-8C拥有一个较大的直升机机身，同时美海军在充分吸取之前的经验教训后专门设计了一个现代的电子屏蔽装置法拉第笼来保护飞机上敏感电子设备免受信号干扰。<br>[4]      与MQ-8B型无人直升机相比，MQ-8C的续航时间增加了一倍，有效载荷增大了两倍，出于节约成本和时间的考虑，几乎95%的MQ-8B最后都被重新改装成MQ-8C。<br>[5] MQ-8C无人直升机自从2013年10月31日首次部署后已经飞行了102架次。", "width": 2, "arrows": "to"}, {"from": "155::n0", "to": "155::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 2013年10月31日<br>Evidence sent IDs: 5<br>Evidence:<br>[5] MQ-8C无人直升机自从2013年10月31日首次部署后已经飞行了102架次。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
