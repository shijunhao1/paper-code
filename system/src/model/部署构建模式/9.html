<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 9</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 9</div>
        <div class="meta">Nodes 6 | Edges 6</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "9::n0", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 9<br>Mentions: 2<br>Sent IDs: 0|1<br>Mentions:<br>name=美国, sent_id=0, pos=[13, 15], type=ENTITY<br>name=美, sent_id=1, pos=[16, 17], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "9::n1", "label": "中东", "title": "<b>中东</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 9<br>Mentions: 3<br>Sent IDs: 0|2|4<br>Mentions:<br>name=中东, sent_id=0, pos=[18, 20], type=ENTITY<br>name=中东, sent_id=2, pos=[42, 44], type=ENTITY<br>name=中东, sent_id=4, pos=[11, 13], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "9::n2", "label": "F-35B隐形战机", "title": "<b>F-35B隐形战机</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 9<br>Mentions: 3<br>Sent IDs: 0|2|3<br>Mentions:<br>name=F-35B战机, sent_id=0, pos=[22, 29], type=ENTITY<br>name=F-35B隐形战机, sent_id=2, pos=[27, 36], type=ENTITY<br>name=F-35B隐形战机, sent_id=3, pos=[45, 54], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "9::n3", "label": "地中海", "title": "<b>地中海</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 9<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=地中海, sent_id=1, pos=[25, 28], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "9::n4", "label": "兵力", "title": "<b>兵力</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 9<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=兵力, sent_id=1, pos=[30, 32], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "9::n5", "label": "俄", "title": "<b>俄</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 9<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=俄, sent_id=1, pos=[17, 18], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "9::n0", "to": "9::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 中东<br>Evidence sent IDs: 0|2|4<br>Evidence:<br>[0] 点击图片进入下一页美媒称，美国首次在中东部署F-35B战机。<br>[2] 有美媒最新曝出，美国海军黄蜂级埃塞克斯号两栖攻击舰满载F-35B隐形战机，首度部署至中东。<br>[4] 报道称，这是美军首次在中东部署F-35B战机。", "width": 2, "arrows": "to"}, {"from": "9::n0", "to": "9::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: F-35B隐形战机<br>Evidence sent IDs: 0|2|3<br>Evidence:<br>[0] 点击图片进入下一页美媒称，美国首次在中东部署F-35B战机。<br>[2] 有美媒最新曝出，美国海军黄蜂级埃塞克斯号两栖攻击舰满载F-35B隐形战机，首度部署至中东。<br>[3] 据台湾《中时电子报》、美国《商业内幕》报道，美国海军黄蜂级埃塞克斯号日前已搭载能垂直起降的F-35B隐形战机抵达非洲之角外海。", "width": 2, "arrows": "to"}, {"from": "9::n0", "to": "9::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 地中海<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 叙利亚近来再次深陷战云密布漩涡，美俄双方为此争相在地中海部署兵力。", "width": 2, "arrows": "to"}, {"from": "9::n0", "to": "9::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 兵力<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 叙利亚近来再次深陷战云密布漩涡，美俄双方为此争相在地中海部署兵力。", "width": 2, "arrows": "to"}, {"from": "9::n5", "to": "9::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 俄<br>Tail entity: 地中海<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 叙利亚近来再次深陷战云密布漩涡，美俄双方为此争相在地中海部署兵力。", "width": 2, "arrows": "to"}, {"from": "9::n5", "to": "9::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 俄<br>Tail entity: 兵力<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 叙利亚近来再次深陷战云密布漩涡，美俄双方为此争相在地中海部署兵力。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
