<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 566</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 566</div>
        <div class="meta">Nodes 5 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "566::n0", "label": "国家导弹防御系统", "title": "<b>国家导弹防御系统</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 566<br>Mentions: 5<br>Sent IDs: 0|1|2|5|7<br>Mentions:<br>name=国家导弹防御系统, sent_id=0, pos=[46, 54], type=ENTITY<br>name=整个系统, sent_id=1, pos=[22, 26], type=ENTITY<br>name=国家导弹防御系统, sent_id=2, pos=[7, 15], type=ENTITY<br>name=国家导弹防御系统, sent_id=5, pos=[13, 21], type=ENTITY<br>name=国家导弹防御系统, sent_id=7, pos=[20, 28], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "566::n1", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 566<br>Mentions: 2<br>Sent IDs: 6|7<br>Mentions:<br>name=美国, sent_id=6, pos=[18, 20], type=ENTITY<br>name=美国政府, sent_id=7, pos=[38, 42], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "566::n2", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 566<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=美国, sent_id=0, pos=[14, 16], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "566::n3", "label": "导弹", "title": "<b>导弹</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 566<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=导弹, sent_id=3, pos=[12, 14], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "566::n4", "label": "2006年或2007年", "title": "<b>2006年或2007年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 566<br>Mentions: 1<br>Sent IDs: 6<br>Mentions:<br>name=2006年或2007年, sent_id=6, pos=[23, 34], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "566::n2", "to": "566::n3", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 美国<br>Tail entity: 导弹<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 他说，在计划进行的19次导弹拦截试验中目前只进行了3次。", "width": 2, "arrows": "to"}, {"from": "566::n1", "to": "566::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国<br>Tail entity: 2006年或2007年<br>Evidence sent IDs: 6<br>Evidence:<br>[6] 如果下一任总统最终决定部署这一系统，美国仍可在2006年或2007年完成这一防御系统的部署。", "width": 2, "arrows": "to"}, {"from": "566::n1", "to": "566::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 国家导弹防御系统<br>Evidence sent IDs: 0|1|2|5|6|7<br>Evidence:<br>[0] 据美联社华盛顿9月1日报道：美国总统克林顿9月1日在华盛顿的乔治敦大学发表演讲，宣布推迟部署国家导弹防御系统。<br>[1] 克林顿说，由于目前对国家导弹防御系统的技术和整个系统的有效性缺乏足够的信心，因此他决定在现阶段不授权部署这一系统。<br>[2] 克林顿说，有关国家导弹防御系统的研制虽然已经取得重大进展，但在该系统被证明完全可行前不应作出相关决定。<br>[5] 克林顿还说，他的决定对完成国家导弹防御系统部署的时间表影响不大。<br>[6] 如果下一任总统最终决定部署这一系统，美国仍可在2006年或2007年完成这一防御系统的部署。<br>[7] 分析家认为，克林顿此举实际上已将是否部署国家导弹防御系统的重大决策留给了下届美国政府。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
