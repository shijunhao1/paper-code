<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <title>Document Graph: 770</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 770</div>
        <div class="meta">Nodes 5 | Edges 4</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "770::n0", "label": "美国", "title": "<b>美国</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 770<br>Mentions: 4<br>Sent IDs: 0|1|4<br>Mentions:<br>name=美国, sent_id=0, pos=[8, 10], type=ENTITY<br>name=美国, sent_id=1, pos=[28, 30], type=ENTITY<br>name=美国, sent_id=4, pos=[4, 6], type=ENTITY<br>name=美国, sent_id=4, pos=[47, 49], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "770::n1", "label": "俄罗斯", "title": "<b>俄罗斯</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 770<br>Mentions: 4<br>Sent IDs: 0|2|3|4<br>Mentions:<br>name=俄罗斯, sent_id=0, pos=[38, 41], type=ENTITY<br>name=俄罗斯, sent_id=2, pos=[12, 15], type=ENTITY<br>name=俄罗斯, sent_id=3, pos=[14, 17], type=ENTITY<br>name=俄罗斯, sent_id=4, pos=[35, 38], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "770::n2", "label": "战术核武器", "title": "<b>战术核武器</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 770<br>Mentions: 3<br>Sent IDs: 4|5<br>Mentions:<br>name=战术核武器, sent_id=4, pos=[28, 33], type=ENTITY<br>name=战术核武器, sent_id=4, pos=[41, 46], type=ENTITY<br>name=核武器, sent_id=5, pos=[12, 15], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "770::n3", "label": "北约成员国边境", "title": "<b>北约成员国边境</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 770<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=北约成员国边境, sent_id=3, pos=[24, 31], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "770::n4", "label": "5个欧洲国家的军事基地", "title": "<b>5个欧洲国家的军事基地</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 770<br>Mentions: 1<br>Sent IDs: 4<br>Mentions:<br>name=5个欧洲国家的军事基地, sent_id=4, pos=[7, 18], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "770::n1", "to": "770::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 俄罗斯<br>Tail entity: 北约成员国边境<br>Evidence sent IDs: 3|4<br>Evidence:<br>[3] 希拉里似乎将战术核弹的削减与俄罗斯自动撤除部署在北约成员国边境的武器的意愿联系在了一起。<br>[4]  据信，美国在5个欧洲国家的军事基地部署了大约 240枚战术核武器，而俄罗斯部署的战术核武器比美国的多十倍。", "width": 2, "arrows": "to"}, {"from": "770::n1", "to": "770::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 俄罗斯<br>Tail entity: 战术核武器<br>Evidence sent IDs: 4|5<br>Evidence:<br>[4]  据信，美国在5个欧洲国家的军事基地部署了大约 240枚战术核武器，而俄罗斯部署的战术核武器比美国的多十倍。<br>[5] 北约内部对撤消在欧洲部署核武器的问题有分歧。", "width": 2, "arrows": "to"}, {"from": "770::n0", "to": "770::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美国<br>Tail entity: 5个欧洲国家的军事基地<br>Evidence sent IDs: 4<br>Evidence:<br>[4]  据信，美国在5个欧洲国家的军事基地部署了大约 240枚战术核武器，而俄罗斯部署的战术核武器比美国的多十倍。", "width": 2, "arrows": "to"}, {"from": "770::n0", "to": "770::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国<br>Tail entity: 战术核武器<br>Evidence sent IDs: 4|5<br>Evidence:<br>[4]  据信，美国在5个欧洲国家的军事基地部署了大约 240枚战术核武器，而俄罗斯部署的战术核武器比美国的多十倍。<br>[5] 北约内部对撤消在欧洲部署核武器的问题有分歧。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
