<!DOCTYPE html>

  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">

  <style>

</head>
<body>
  <div class="page">
    <div class="panel">

        <div class="title">Document Graph: 2963</div>

      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>

  </div>
  <script>
    const nodesData = [{"id": "2963::n0", "label": "日本", "title": "<b>日本</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 2963<br>Mentions: 4<br>Sent IDs: 0|1|3<br>Mentions:<br>name=日本, sent_id=0, pos=[8, 10], type=ENTITY<br>name=日本, sent_id=0, pos=[39, 41], type=ENTITY<br>name=日, sent_id=1, pos=[26, 27], type=ENTITY<br>name=日本, sent_id=3, pos=[16, 18], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "2963::n1", "label": "武器动能弹头", "title": "<b>武器动能弹头</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 2963<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=武器动能弹头, sent_id=0, pos=[19, 25], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "2963::n2", "label": "美", "title": "<b>美</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 2963<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=美, sent_id=1, pos=[25, 26], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "2963::n3", "label": "SM-3 型Block 2A弹道导弹", "title": "<b>SM-3 型Block 2A弹道导弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 2963<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=SM-3 型Block 2A弹道导弹, sent_id=1, pos=[43, 61], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "2963::n4", "label": "朝鲜", "title": "<b>朝鲜</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 2963<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=朝鲜, sent_id=3, pos=[1, 3], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "2963::n5", "label": "弹道导弹", "title": "<b>弹道导弹</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 2963<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=弹道导弹, sent_id=3, pos=[8, 12], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "2963::n0", "to": "2963::n1", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 日本<br>Tail entity: 武器动能弹头<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 据知情人士透露，日本一直提醒美国，因为武器动能弹头需要进行额外的试验，由美国和日本合作设计的导弹拦截器可能需要24个月的准备期，需要的时间比之前预期的要长。", "width": 2, "arrows": "to"}, {"from": "2963::n2", "to": "2963::n3", "label": "安装", "title": "<b>安装</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美<br>Tail entity: SM-3 型Block 2A弹道导弹<br>Evidence sent IDs: 1<br>Evidence:<br>[1]  该知情人士称该导弹拦截器设计时限的延长，将会推迟美日2020年共同安装导弹防御系统中SM-3 型Block 2A弹道导弹的计划安排。", "width": 2, "arrows": "to"}, {"from": "2963::n0", "to": "2963::n3", "label": "安装", "title": "<b>安装</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 日本<br>Tail entity: SM-3 型Block 2A弹道导弹<br>Evidence sent IDs: 1<br>Evidence:<br>[1]  该知情人士称该导弹拦截器设计时限的延长，将会推迟美日2020年共同安装导弹防御系统中SM-3 型Block 2A弹道导弹的计划安排。", "width": 2, "arrows": "to"}, {"from": "2963::n4", "to": "2963::n5", "label": "试射", "title": "<b>试射</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 朝鲜<br>Tail entity: 弹道导弹<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 自朝鲜在本国进行弹道导弹试射后，日本于1998年开始寻求和美国就导弹拦截系统展开合作。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
