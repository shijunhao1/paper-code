<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 212</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 212</div>
        <div class="meta">Nodes 5 | Edges 3</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "212::n0", "label": "俄罗斯", "title": "<b>俄罗斯</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 212<br>Mentions: 6<br>Sent IDs: 0|2|3|4|5|6<br>Mentions:<br>name=俄罗斯, sent_id=0, pos=[35, 38], type=ENTITY<br>name=俄罗斯, sent_id=2, pos=[8, 11], type=ENTITY<br>name=俄罗斯, sent_id=3, pos=[17, 20], type=ENTITY<br>name=俄罗斯, sent_id=4, pos=[38, 41], type=ENTITY<br>name=俄罗斯, sent_id=5, pos=[0, 3], type=ENTITY<br>name=俄罗斯, sent_id=6, pos=[0, 3], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "212::n1", "label": "伊朗", "title": "<b>伊朗</b><br>Type: ENTITY<br>Entity role: Object<br>Doc: 212<br>Mentions: 7<br>Sent IDs: 0|2|3|4|5|6<br>Mentions:<br>name=伊朗, sent_id=0, pos=[63, 65], type=ENTITY<br>name=伊朗, sent_id=2, pos=[12, 14], type=ENTITY<br>name=伊朗, sent_id=3, pos=[14, 16], type=ENTITY<br>name=伊朗, sent_id=4, pos=[1, 3], type=ENTITY<br>name=伊朗, sent_id=5, pos=[5, 7], type=ENTITY<br>name=伊朗, sent_id=6, pos=[4, 6], type=ENTITY<br>name=伊朗, sent_id=6, pos=[23, 25], type=ENTITY", "color": "#78D3F8", "shape": "dot", "size": 18}, {"id": "212::n2", "label": "俄空天军战斗机", "title": "<b>俄空天军战斗机</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 212<br>Mentions: 1<br>Sent IDs: 4<br>Mentions:<br>name=俄空天军战斗机, sent_id=4, pos=[6, 13], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "212::n3", "label": "布什尔基地", "title": "<b>布什尔基地</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 212<br>Mentions: 1<br>Sent IDs: 4<br>Mentions:<br>name=布什尔基地, sent_id=4, pos=[15, 20], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "212::n4", "label": "俄特种部队", "title": "<b>俄特种部队</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 212<br>Mentions: 1<br>Sent IDs: 4<br>Mentions:<br>name=俄特种部队, sent_id=4, pos=[24, 29], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "212::n4", "to": "212::n2", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 俄特种部队<br>Tail entity: 俄空天军战斗机<br>Evidence sent IDs: 4<br>Evidence:<br>[4]  伊朗将允许俄空天军战斗机使用布什尔基地，并允许俄特种部队驻扎在此，据报道，俄罗斯这些军事力量将成为伊朗军方的顾问。", "width": 2, "arrows": "to"}, {"from": "212::n4", "to": "212::n3", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 俄特种部队<br>Tail entity: 布什尔基地<br>Evidence sent IDs: 4<br>Evidence:<br>[4]  伊朗将允许俄空天军战斗机使用布什尔基地，并允许俄特种部队驻扎在此，据报道，俄罗斯这些军事力量将成为伊朗军方的顾问。", "width": 2, "arrows": "to"}, {"from": "212::n0", "to": "212::n1", "label": "援助", "title": "<b>援助</b><br>Relation: Support__Object<br>Role: Object<br>Head entity: 俄罗斯<br>Tail entity: 伊朗<br>Evidence sent IDs: 0|2|3|4|5|6<br>Evidence:<br>[0] [据美国《新闻特刊》2019年8月18日报道]据乌克兰的一家媒体报道，俄罗斯正在扩大其在中东的海军力量，在伊朗南部的两个港口与伊朗合作建立前沿基地。<br>[2] 2019年7月，俄罗斯和伊朗在一份备忘录中宣布加强军事合作。<br>[3] 伊朗海军司令汗扎迪表示，这是伊朗和俄罗斯国防关系的一个转折点。<br>[4]  伊朗将允许俄空天军战斗机使用布什尔基地，并允许俄特种部队驻扎在此，据报道，俄罗斯这些军事力量将成为伊朗军方的顾问。<br>[5] 俄罗斯将对伊朗进行经济援助，以换取使用中东战略军事基地。<br>[6] 俄罗斯与伊朗的军事合作协议得到伊斯兰革命卫队和伊朗最高领袖哈梅内伊的支持。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
