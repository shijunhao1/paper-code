<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 321</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 321</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "321::n0", "label": "日本防务省", "title": "<b>日本防务省</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 321<br>Mentions: 2<br>Sent IDs: 0|2<br>Mentions:<br>name=日本防务省, sent_id=0, pos=[0, 5], type=ENTITY<br>name=日本防卫省, sent_id=2, pos=[1, 6], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "321::n1", "label": "反舰导弹", "title": "<b>反舰导弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 321<br>Mentions: 5<br>Sent IDs: 0|2|4|5<br>Mentions:<br>name=反舰导弹, sent_id=0, pos=[18, 22], type=ENTITY<br>name=12式导弹, sent_id=2, pos=[11, 16], type=ENTITY<br>name=导弹, sent_id=4, pos=[21, 23], type=ENTITY<br>name=新反舰导弹, sent_id=5, pos=[0, 5], type=ENTITY<br>name=12式反舰导弹, sent_id=5, pos=[23, 30], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "321::n2", "label": "近东海的宫古、石垣、奄美等岛屿", "title": "<b>近东海的宫古、石垣、奄美等岛屿</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 321<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=近东海的宫古、石垣、奄美等岛屿, sent_id=2, pos=[21, 36], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "321::n0", "to": "321::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 日本防务省<br>Tail entity: 反舰导弹<br>Evidence sent IDs: 0|2|4|5<br>Evidence:<br>[0] 日本防务省日前公布了联合国内企业开展反舰导弹研究的计划，以保护对偏远岛屿的主权。<br>[2]  日本防卫省正在讨论将12式导弹直接部署于近东海的宫古、石垣、奄美等岛屿上。<br>[4] 新式导弹将安装在车辆平台上，这将极大地增强导弹部署的灵活性和机动性。<br>[5] 新反舰导弹的最大射程将达到300千米，而之前的12式反舰导弹射程仅为100千米。", "width": 2, "arrows": "to"}, {"from": "321::n0", "to": "321::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 日本防务省<br>Tail entity: 近东海的宫古、石垣、奄美等岛屿<br>Evidence sent IDs: 2<br>Evidence:<br>[2]  日本防卫省正在讨论将12式导弹直接部署于近东海的宫古、石垣、奄美等岛屿上。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
