<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 1044</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 1044</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "1044::n0", "label": "MH-60R/S", "title": "<b>MH-60R/S</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 1044<br>Mentions: 4<br>Sent IDs: 0|1|2|4<br>Mentions:<br>name=MH-60S多任务直升机, sent_id=0, pos=[55, 67], type=ENTITY<br>name=MH-60R/S, sent_id=1, pos=[27, 35], type=ENTITY<br>name=MH-60R/S, sent_id=2, pos=[26, 34], type=ENTITY<br>name=MH-60R/S, sent_id=4, pos=[14, 22], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "1044::n1", "label": "美国海军", "title": "<b>美国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1044<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=美国海军, sent_id=0, pos=[43, 47], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "1044::n2", "label": "2009年", "title": "<b>2009年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 1044<br>Mentions: 1<br>Sent IDs: 5<br>Mentions:<br>name=2009年, sent_id=5, pos=[22, 27], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "1044::n1", "to": "1044::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美国海军<br>Tail entity: MH-60R/S<br>Evidence sent IDs: 0|1|2|4|5<br>Evidence:<br>[0] 洛克希德・马丁公司获得一份金额1990万美元的合同，作为一个多年项目的第一阶段，以提高美国海军的MH-60R和MH-60S多任务直升机的性能。<br>[1]  根据这份合同，洛・马公司将开发和综合有关技术，以改善MH-60R/S与其它作战飞机和舰艇之间的通信能力。<br>[2] 合同中的主要内容包括综合Link 16数据链，以允许MH-60R/S与其它飞机之间交换态势感知数据；<br>[4]  合同中的改进工作还包括提高MH-60R/S的任务计划能力，改进多频谱瞄准系统和前视红外传感器，提高维修性和可靠性。<br>[5] 合同的开发和综合工作将持续到2007年，计划2009年部署改进后的直升机。", "width": 2, "arrows": "to"}, {"from": "1044::n1", "to": "1044::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 美国海军<br>Tail entity: 2009年<br>Evidence sent IDs: 5<br>Evidence:<br>[5] 合同的开发和综合工作将持续到2007年，计划2009年部署改进后的直升机。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
