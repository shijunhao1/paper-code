次HTV-2飞行试验均未取得成功。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');

    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75

        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {

            align: 'middle',

          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }

          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
