    const nodesData = [{"id": "209::n0", "label": "印度", "title": "<b>印度</b><br>Type: ENTITY<br>Entity role: Object<br>Doc: 209<br>Mentions: 4<br>Sent IDs: 0|2|3<br>Mentions:<br>name=印度, sent_id=0, pos=[27, 29], type=ENTITY<br>name=印度, sent_id=2, pos=[43, 45], type=ENTITY<br>name=印度, sent_id=3, pos=[6, 8], type=ENTITY<br>name=印度, sent_id=3, pos=[20, 22], type=ENTITY", "color": "#78D3F8", "shape": "dot", "size": 18}, {"id": "209::n1", "label": "巴基斯坦", "title": "<b>巴基斯坦</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 209<br>Mentions: 3<br>Sent IDs: 0|1|3<br>Mentions:<br>name=巴基斯坦, sent_id=0, pos=[30, 34], type=ENTITY<br>name=巴基斯坦, sent_id=1, pos=[39, 43], type=ENTITY<br>name=巴基斯坦, sent_id=3, pos=[25, 29], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "209::n2", "label": "印度海军", "title": "<b>印度海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 209<br>Mentions: 3<br>Sent IDs: 0|1|2<br>Mentions:<br>name=印度海军, sent_id=0, pos=[44, 48], type=ENTITY<br>name=印度海军, sent_id=1, pos=[29, 33], type=ENTITY<br>name=印度海军, sent_id=2, pos=[2, 6], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "209::n3", "label": "核潜艇", "title": "<b>核潜艇</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 209<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=核潜艇, sent_id=2, pos=[73, 76], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "209::n4", "label": "2月14日", "title": "<b>2月14日</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 209<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=2月14日, sent_id=3, pos=[1, 6], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}, {"id": "209::n5", "label": "克什米尔地区", "title": "<b>克什米尔地区</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 209<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=克什米尔地区, sent_id=3, pos=[9, 15], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "209::n2", "to": "209::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 印度海军<br>Tail entity: 核潜艇<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 尽管印度海军目前拥有两种可供使用的核动力潜艇，包括一艘从俄罗斯租来阿库拉型核潜艇和一艘印度制造的歼敌者号核潜艇，但国防部没有明确说明具体部署了哪些核潜艇。", "width": 2, "arrows": "to"}, {"from": "209::n1", "to": "209::n4", "label": "袭击", "title": "<b>袭击</b><br>Relation: Conflict__Date<br>Role: Date<br>Head entity: 巴基斯坦<br>Tail entity: 2月14日<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 自2月14日印度在克什米尔地区遭遇袭击，印度指责是巴基斯坦指使，并扬言进行报复，两个拥有核武器的国家间的紧张局势不断升级。", "width": 2, "arrows": "to"}, {"from": "209::n1", "to": "209::n0", "label": "袭击", "title": "<b>袭击</b><br>Relation: Conflict__Object<br>Role: Object<br>Head entity: 巴基斯坦<br>Tail entity: 印度<br>Evidence sent IDs: 0|2|3<br>Evidence:<br>[0] 据俄罗斯卫星网报道，印度国防部周日在一份声明中称，随着印度和巴基斯坦之间紧张局势的升级，印度海军的主要作战部队，包括由维克拉玛蒂亚号航空母舰为首的战斗群、核潜艇以及数十艘其他船只、潜艇和飞机，迅速从战区级战备演习状态转移到作战部署状态。<br>[2] 尽管印度海军目前拥有两种可供使用的核动力潜艇，包括一艘从俄罗斯租来阿库拉型核潜艇和一艘印度制造的歼敌者号核潜艇，但国防部没有明确说明具体部署了哪些核潜艇。<br>[3] 自2月14日印度在克什米尔地区遭遇袭击，印度指责是巴基斯坦指使，并扬言进行报复，两个拥有核武器的国家间的紧张局势不断升级。", "width": 2, "arrows": "to"}, {"from": "209::n1", "to": "209::n5", "label": "袭击", "title": "<b>袭击</b><br>Relation: Conflict__Location<br>Role: Location<br>Head entity: 巴基斯坦<br>Tail entity: 克什米尔地区<br>Evidence sent IDs: 3<br>Evidence:<br>[3] 自2月14日印度在克什米尔地区遭遇袭击，印度指责是巴基斯坦指使，并扬言进行报复，两个拥有核武器的国家间的紧张局势不断升级。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
