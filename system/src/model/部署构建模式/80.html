<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 80</div>
        <div class="meta">Nodes 7 | Edges 7</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>

    </div>
  </div>
  <script>
    const nodesData = [{"id": "80::n0", "label": "光辉轻型战斗机", "title": "<b>光辉轻型战斗机</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 80<br>Mentions: 2<br>Sent IDs: 0|6<br>Mentions:<br>name=光辉轻型战斗机, sent_id=0, pos=[3, 10], type=ENTITY<br>name=光辉战斗机, sent_id=6, pos=[0, 5], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "80::n1", "label": "LCA飞机", "title": "<b>LCA飞机</b><br>Type: ENTITY<br>Entity role: Equipment<br>Doc: 80<br>Mentions: 3<br>Sent IDs: 2|4|7<br>Mentions:<br>name=LCA飞机, sent_id=2, pos=[6, 11], type=ENTITY<br>name=飞机, sent_id=4, pos=[4, 6], type=ENTITY<br>name=LCA, sent_id=7, pos=[12, 15], type=ENTITY", "color": "#7262FD", "shape": "dot", "size": 18}, {"id": "80::n2", "label": "印度", "title": "<b>印度</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 80<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=印度, sent_id=0, pos=[0, 2], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "80::n3", "label": "激光制导1000磅炸弹", "title": "<b>激光制导1000磅炸弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 80<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=激光制导1000磅炸弹, sent_id=2, pos=[25, 36], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "80::n4", "label": "非制导炸弹", "title": "<b>非制导炸弹</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 80<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=非制导炸弹, sent_id=2, pos=[37, 42], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "80::n5", "label": "拉贾斯坦邦的沙漠地区", "title": "<b>拉贾斯坦邦的沙漠地区</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 80<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=拉贾斯坦邦的沙漠地区, sent_id=1, pos=[26, 36], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "80::n6", "label": "去年9月", "title": "<b>去年9月</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 80<br>Mentions: 1<br>Sent IDs: 3<br>Mentions:<br>name=去年9月, sent_id=3, pos=[5, 9], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "80::n2", "to": "80::n3", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 印度<br>Tail entity: 激光制导1000磅炸弹<br>Evidence sent IDs: 2<br>Evidence:<br>[2]  试验由3架LCA飞机，部署一系列武器，其中包括：激光制导1000磅炸弹和非制导炸弹。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n4", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 印度<br>Tail entity: 非制导炸弹<br>Evidence sent IDs: 2<br>Evidence:<br>[2]  试验由3架LCA飞机，部署一系列武器，其中包括：激光制导1000磅炸弹和非制导炸弹。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n5", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Location<br>Role: Location<br>Head entity: 印度<br>Tail entity: 拉贾斯坦邦的沙漠地区<br>Evidence sent IDs: 1<br>Evidence:<br>[1] 据一位国防部官员称，这种单座、单发超声速战斗机也正在拉贾斯坦邦的沙漠地区进行飞行试验。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n1", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 印度<br>Tail entity: LCA飞机<br>Evidence sent IDs: 1|2|4|7<br>Evidence:<br>[1] 据一位国防部官员称，这种单座、单发超声速战斗机也正在拉贾斯坦邦的沙漠地区进行飞行试验。<br>[2]  试验由3架LCA飞机，部署一系列武器，其中包括：激光制导1000磅炸弹和非制导炸弹。<br>[4]  据称，飞机搭载了各类型武器，包括精确制导炸弹和传统炸弹，试验期间最多达到500千克。<br>[7] 海上试验将很快进行，并且LCA正在准备安装超视距导弹。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n0", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 印度<br>Tail entity: 光辉轻型战斗机<br>Evidence sent IDs: 0|6<br>Evidence:<br>[0] 印度的光辉轻型战斗机已完成了武器试验，从而为年底前的作战许可做好准备。<br>[6] 光辉战斗机计划在2013年投入服役。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n6", "label": "试验", "title": "<b>试验</b><br>Relation: Experiment__Date<br>Role: Date<br>Head entity: 印度<br>Tail entity: 去年9月<br>Evidence sent IDs: 0|3<br>Evidence:<br>[0] 印度的光辉轻型战斗机已完成了武器试验，从而为年底前的作战许可做好准备。<br>[3] 这些试验是去年9月武器试验的延伸和扩展。", "width": 2, "arrows": "to"}, {"from": "80::n2", "to": "80::n0", "label": "海上试验", "title": "<b>海上试验</b><br>Relation: Experiment__Equipment<br>Role: Equipment<br>Head entity: 印度<br>Tail entity: 光辉轻型战斗机<br>Evidence sent IDs: 0|6|7<br>Evidence:<br>[0] 印度的光辉轻型战斗机已完成了武器试验，从而为年底前的作战许可做好准备。<br>[6] 光辉战斗机计划在2013年投入服役。<br>[7] 海上试验将很快进行，并且LCA正在准备安装超视距导弹。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
