<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 306</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 306</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "306::n0", "label": "中型和重型直升机", "title": "<b>中型和重型直升机</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 306<br>Mentions: 2<br>Sent IDs: 0|1<br>Mentions:<br>name=中型和重型直升机, sent_id=0, pos=[33, 41], type=ENTITY<br>name=直升机, sent_id=1, pos=[43, 46], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "306::n1", "label": "美海军航空系统司令部", "title": "<b>美海军航空系统司令部</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 306<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=美海军航空系统司令部, sent_id=1, pos=[3, 13], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "306::n2", "label": "Kauai的Barking沙滩", "title": "<b>Kauai的Barking沙滩</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 306<br>Mentions: 1<br>Sent IDs: 1<br>Mentions:<br>name=Kauai的Barking沙滩, sent_id=1, pos=[49, 64], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "306::n1", "to": "306::n0", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 美海军航空系统司令部<br>Tail entity: 中型和重型直升机<br>Evidence sent IDs: 0|1<br>Evidence:<br>[0] 美国海军计划在未来几个月内授予一份金额数百万美元的合同，订购外包的中型和重型直升机在其夏威夷外的太平洋导弹靶场设施执行诸如武器回收、视频监视、靶场清理、灭火和运输任务。<br>[1]  根据美海军航空系统司令部7月29日发布的招标书，中标的合同商将拥有和操作这些直升机，直升机驻扎在Kauai的Barking沙滩。", "width": 2, "arrows": "to"}, {"from": "306::n1", "to": "306::n2", "label": "驻扎", "title": "<b>驻扎</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 美海军航空系统司令部<br>Tail entity: Kauai的Barking沙滩<br>Evidence sent IDs: 1<br>Evidence:<br>[1]  根据美海军航空系统司令部7月29日发布的招标书，中标的合同商将拥有和操作这些直升机，直升机驻扎在Kauai的Barking沙滩。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
