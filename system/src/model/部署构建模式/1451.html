<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 1451</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 1451</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "1451::n0", "label": "NNSA", "title": "<b>NNSA</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 1451<br>Mentions: 4<br>Sent IDs: 0|1|2|4<br>Mentions:<br>name=超级计算机专家组, sent_id=0, pos=[25, 33], type=ENTITY<br>name=NNSA, sent_id=1, pos=[9, 13], type=ENTITY<br>name=NNSA, sent_id=2, pos=[9, 13], type=ENTITY<br>name=NNSA, sent_id=4, pos=[3, 7], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "1451::n1", "label": "国家核军工管理局", "title": "<b>国家核军工管理局</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 1451<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=国家核军工管理局, sent_id=0, pos=[14, 22], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "1451::n2", "label": "日本", "title": "<b>日本</b><br>Type: ENTITY<br>Entity role: Object<br>Doc: 1451<br>Mentions: 1<br>Sent IDs: 2<br>Mentions:<br>name=日本, sent_id=2, pos=[16, 18], type=ENTITY", "color": "#78D3F8", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "1451::n1", "to": "1451::n0", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 国家核军工管理局<br>Tail entity: NNSA<br>Evidence sent IDs: 0|1|2|4<br>Evidence:<br>[0] 负责保护核武器的美国机构――国家核军工管理局，部署超级计算机专家组来评估日本核危机的辐射危险。<br>[1]  除了保护核武库，NNSA被视为美国境内任何放射性事故的主要响应机构。<br>[2] 因此，一些专家称，NNSA在援助日本方面具有独特优势。<br>[4]  周一NNSA官员称，他们已启动国家大气释放咨询中心，该中心由计算机、核科学和气象学领域专家组成。", "width": 2, "arrows": "to"}, {"from": "1451::n0", "to": "1451::n2", "label": "援助", "title": "<b>援助</b><br>Relation: Support__Object<br>Role: Object<br>Head entity: NNSA<br>Tail entity: 日本<br>Evidence sent IDs: 2<br>Evidence:<br>[2] 因此，一些专家称，NNSA在援助日本方面具有独特优势。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
