<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 479</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 479</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "479::n0", "label": "医疗船", "title": "<b>医疗船</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 479<br>Mentions: 4<br>Sent IDs: 0|1|2|5<br>Mentions:<br>name=医疗船, sent_id=0, pos=[10, 13], type=ENTITY<br>name=名为百眼巨人的医疗船, sent_id=1, pos=[3, 13], type=ENTITY<br>name=百眼巨人号, sent_id=2, pos=[5, 10], type=ENTITY<br>name=医疗船, sent_id=5, pos=[40, 43], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "479::n1", "label": "海湾地区", "title": "<b>海湾地区</b><br>Type: ENTITY<br>Entity role: Location<br>Doc: 479<br>Mentions: 3<br>Sent IDs: 0|1|3<br>Mentions:<br>name=海湾地区, sent_id=0, pos=[15, 19], type=ENTITY<br>name=海湾地区, sent_id=1, pos=[42, 46], type=ENTITY<br>name=海湾地区, sent_id=3, pos=[27, 31], type=ENTITY", "color": "#61DDAA", "shape": "dot", "size": 18}, {"id": "479::n2", "label": "英国海军", "title": "<b>英国海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 479<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=英国海军, sent_id=0, pos=[0, 4], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "479::n2", "to": "479::n1", "label": "派遣", "title": "<b>派遣</b><br>Relation: Deploy__Location<br>Role: Location<br>Head entity: 英国海军<br>Tail entity: 海湾地区<br>Evidence sent IDs: 0|1|3<br>Evidence:<br>[0] 英国海军正在派遣一艘医疗船前往海湾地区，越来越明显的迹象表明：英国正在准备参加美国领导的对伊战争。<br>[1]  这艘名为百眼巨人的医疗船将作为英国皇家方舟号航母作战编队的一部分，将在这个月末开赴海湾地区。<br>[3]  但是英国国防部说这仅仅是应变措施，皇家方舟号航母停靠海湾地区仅仅是其在远东地区进行长期的计划演习途中一部分。", "width": 2, "arrows": "to"}, {"from": "479::n2", "to": "479::n0", "label": "派遣", "title": "<b>派遣</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 英国海军<br>Tail entity: 医疗船<br>Evidence sent IDs: 0|1|2|5<br>Evidence:<br>[0] 英国海军正在派遣一艘医疗船前往海湾地区，越来越明显的迹象表明：英国正在准备参加美国领导的对伊战争。<br>[1]  这艘名为百眼巨人的医疗船将作为英国皇家方舟号航母作战编队的一部分，将在这个月末开赴海湾地区。<br>[2]  据估计，百眼巨人号在2月之前不会随同护卫舰出发的，因为该船需要安装化学和生物保护装置。<br>[5]  该医疗船排水量为12,500吨，在舰队中基本上是作为直升机训练舰使用的，但作为医疗船在战争中起到一个次要的角色。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
