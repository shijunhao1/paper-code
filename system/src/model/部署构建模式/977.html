<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 977</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 977</div>
        <div class="meta">Nodes 3 | Edges 2</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "977::n0", "label": "海军", "title": "<b>海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 977<br>Mentions: 3<br>Sent IDs: 0|1|5<br>Mentions:<br>name=美海军, sent_id=0, pos=[8, 11], type=ENTITY<br>name=海军, sent_id=1, pos=[46, 48], type=ENTITY<br>name=海军, sent_id=5, pos=[4, 6], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "977::n1", "label": "新型潜艇", "title": "<b>新型潜艇</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 977<br>Mentions: 4<br>Sent IDs: 0|1|2|3<br>Mentions:<br>name=新型攻击型核潜艇, sent_id=0, pos=[23, 31], type=ENTITY<br>name=新型潜艇, sent_id=1, pos=[59, 63], type=ENTITY<br>name=新潜艇, sent_id=2, pos=[13, 16], type=ENTITY<br>name=新型潜艇, sent_id=3, pos=[39, 43], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}, {"id": "977::n2", "label": "2044年", "title": "<b>2044年</b><br>Type: ENTITY<br>Entity role: Date<br>Doc: 977<br>Mentions: 1<br>Sent IDs: 0<br>Mentions:<br>name=2044年, sent_id=0, pos=[14, 19], type=ENTITY", "color": "#F6BD16", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "977::n0", "to": "977::n2", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Date<br>Role: Date<br>Head entity: 海军<br>Tail entity: 2044年<br>Evidence sent IDs: 0<br>Evidence:<br>[0] 美国海军官员称，美海军计划于2044年开始部署新型攻击型核潜艇。", "width": 2, "arrows": "to"}, {"from": "977::n0", "to": "977::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 海军<br>Tail entity: 新型潜艇<br>Evidence sent IDs: 0|1|2|3<br>Evidence:<br>[0] 美国海军官员称，美海军计划于2044年开始部署新型攻击型核潜艇。<br>[1]  在海军潜艇联盟的年度研讨会上，潜艇项目执行办公室行政主管George Drakely表示，海军计划于2024年开始对新型潜艇的设计开展可替代性分析，预计于2034年开始建造。<br>[2] 并表示，经济可承受性将成为新潜艇设计中的重点考虑因素。<br>[3]  按进度，48艘弗吉尼亚级核潜艇的最后一艘将于2034年交付，之后就将开始建造新型潜艇。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
