<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Graph: 568</title>
  <link rel="stylesheet" href="./vis-9.1.2/vis-network.css">
  <script src="./vis-9.1.2/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      padding: 16px;
    }
    .panel {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 18px;
      font-weight: 700;
    }
    .meta {
      color: #6b7280;
      font-size: 13px;
    }
    .legend {
      padding: 10px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: #4b5563;
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
    }
    #mynetwork {
      width: 100%;
      height: 85vh;
      min-height: 760px;
      background: #ffffff;
    }
    .empty {
      padding: 40px 18px;
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="header">
        <div class="title">Document Graph: 568</div>
        <div class="meta">Nodes 2 | Edges 1</div>
      </div>
      <div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#5B8FF9"></span>Subject</span><span class="legend-item"><span class="legend-dot" style="background:#61DDAA"></span>Location</span><span class="legend-item"><span class="legend-dot" style="background:#F6BD16"></span>Date</span><span class="legend-item"><span class="legend-dot" style="background:#7262FD"></span>Equipment</span><span class="legend-item"><span class="legend-dot" style="background:#F08BB4"></span>Militaryforce</span><span class="legend-item"><span class="legend-dot" style="background:#78D3F8"></span>Object</span><span class="legend-item"><span class="legend-dot" style="background:#FF9D4D"></span>Participant</span><span class="legend-item"><span class="legend-dot" style="background:#BFBFBF"></span>Unknown</span></div>
      <div id="mynetwork"></div>
    </div>
  </div>
  <script>
    const nodesData = [{"id": "568::n0", "label": "海军", "title": "<b>海军</b><br>Type: ENTITY<br>Entity role: Subject<br>Doc: 568<br>Mentions: 4<br>Sent IDs: 0|2|5|6<br>Mentions:<br>name=美国海军, sent_id=0, pos=[0, 4], type=ENTITY<br>name=海军, sent_id=2, pos=[53, 55], type=ENTITY<br>name=海军, sent_id=5, pos=[0, 2], type=ENTITY<br>name=海军, sent_id=6, pos=[3, 5], type=ENTITY", "color": "#5B8FF9", "shape": "dot", "size": 18}, {"id": "568::n1", "label": "肯尼迪号航母", "title": "<b>肯尼迪号航母</b><br>Type: ENTITY<br>Entity role: Militaryforce<br>Doc: 568<br>Mentions: 4<br>Sent IDs: 0|2|4|7<br>Mentions:<br>name=约翰・F・肯尼迪号航母, sent_id=0, pos=[12, 23], type=ENTITY<br>name=肯尼迪号航母, sent_id=2, pos=[62, 68], type=ENTITY<br>name=肯尼迪号, sent_id=4, pos=[9, 13], type=ENTITY<br>name=肯尼迪号航母, sent_id=7, pos=[25, 31], type=ENTITY", "color": "#F08BB4", "shape": "dot", "size": 18}];
    const edgesData = [{"from": "568::n0", "to": "568::n1", "label": "部署", "title": "<b>部署</b><br>Relation: Deploy__Militaryforce<br>Role: Militaryforce<br>Head entity: 海军<br>Tail entity: 肯尼迪号航母<br>Evidence sent IDs: 0|2|4|7<br>Evidence:<br>[0] 美国海军将被强迫继续维护约翰・F・肯尼迪号航母，虽然他们迫切希望能够退役这艘老化的航母。<br>[2]  国防部长拉姆斯菲尔德2004年底向各军种宣布，将在未来6年里削减600亿美元的资金用于支持伊拉克的战争，海军因此也决定退役肯尼迪号航母以节约资金。<br>[4]  根据海军的观点，肯尼迪号的退役将有助于在2011年前将部队的数量从360000降到计划的320000。<br>[7]  自从2004年12月13日完成最后的海外部署后，肯尼迪号航母一直没有投入使用，目前主要用于海军飞行员的海上航母飞行资格认证。", "width": 2, "arrows": "to"}];

    const container = document.getElementById('mynetwork');
    if (!window.vis) {
      container.innerHTML = '<div class="empty">vis-network assets failed to load. Please check the local vis-9.1.2 directory.</div>';
    } else if (!nodesData.length) {
      container.innerHTML = '<div class="empty">No graph data is available for visualization.</div>';
    } else {
      const nodes = new vis.DataSet(nodesData);
      const edges = new vis.DataSet(edgesData);
      const data = { nodes, edges };
      const options = {
        interaction: {
          hover: true,
          navigationButtons: true,
          keyboard: true
        },
        layout: {
          improvedLayout: true
        },
        physics: {
          enabled: true,
          stabilization: {
            enabled: true,
            iterations: 300,
            fit: true
          },
          barnesHut: {
            gravitationalConstant: -3200,
            centralGravity: 0.2,
            springLength: 180,
            springConstant: 0.04,
            damping: 0.09
          },
          minVelocity: 0.75
        },
        edges: {
          smooth: false,
          color: {
            color: '#94a3b8',
            highlight: '#2563eb'
          },
          font: {
            size: 12,
            align: 'middle',
            strokeWidth: 0,
            background: 'rgba(255,255,255,0.75)'
          }
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
          font: {
            size: 16,
            color: '#111827'
          }
        }
      };

      const network = new vis.Network(container, data, options);
      network.once('stabilizationIterationsDone', function() {
        network.fit({
          animation: {
            duration: 500,
            easingFunction: 'easeInOutQuad'
          }
        });
      });
    }
  </script>
</body>
</html>
